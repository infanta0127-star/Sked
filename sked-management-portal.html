<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="admin-favicon.svg">
    <title>Sked Management Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a14;
            --bg2: #10101e;
            --bg3: #16162a;
            --border: #2a2a42;
            --accent: #5b7cf6;
            --accent2: #7c9ef8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .portal-header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .portal-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
        }

        .portal-header .logo i {
            color: var(--accent);
            font-size: 20px;
        }

        .portal-header .badge {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .portal-header .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .portal-header .user-email {
            color: var(--text);
            font-weight: 500;
        }

        .btn-logout {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Access Denied ── */
        #access-denied {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            gap: 16px;
        }

        #access-denied i { font-size: 64px; color: var(--danger); opacity: .6; }
        #access-denied h2 { font-size: 24px; color: var(--text); }
        #access-denied p { color: var(--muted); font-size: 14px; }

        /* ── Loading ── */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            gap: 16px;
            color: var(--muted);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Main Content ── */
        #admin-content {
            display: none;
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
        }

        .section-title i { color: var(--accent); }

        /* ── Invite Code Panel ── */
        .code-display {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .code-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .code-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--accent2);
            font-family: monospace;
        }

        .code-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .code-status.active { background: rgba(74,222,128,.1); color: var(--success); }
        .code-status.inactive { background: rgba(248,113,113,.1); color: var(--danger); }

        .code-history {
            margin-top: 16px;
        }

        .code-history-title {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .code-history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
        }

        .code-history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 13px;
        }

        .code-mono { font-family: monospace; font-weight: 700; letter-spacing: 3px; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }
        .btn-primary:hover { opacity: .85; transform: translateY(-1px); }

        .btn-danger {
            background: rgba(248,113,113,.1);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,.3);
        }
        .btn-danger:hover { background: rgba(248,113,113,.2); }

        .btn-success {
            background: rgba(74,222,128,.1);
            color: var(--success);
            border: 1px solid rgba(74,222,128,.3);
        }
        .btn-success:hover { background: rgba(74,222,128,.2); }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 7px;
        }

        /* ── User Table ── */
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }

        .user-table th {
            text-align: left;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
        }

        .user-table td {
            padding: 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(42,42,66,.5);
            vertical-align: middle;
        }

        .user-table tr:last-child td { border-bottom: none; }
        .user-table tr:hover td { background: rgba(91,124,246,.04); }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .tag-active { background: rgba(74,222,128,.1); color: var(--success); }
        .tag-inactive { background: rgba(248,113,113,.1); color: var(--danger); }
        .tag-admin { background: rgba(251,191,36,.1); color: var(--warning); }
        .tag-user { background: rgba(100,116,139,.1); color: var(--muted); }

        .email-cell { font-weight: 500; }

        .invite-code-chip {
            font-family: monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent2);
            background: rgba(91,124,246,.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--muted);
            font-size: 14px;
        }

        /* ── Stats ── */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent2);
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── Confirm Modal ── */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .confirm-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 360px;
            text-align: center;
        }

        .confirm-box h3 { margin-bottom: 10px; font-size: 18px; }
        .confirm-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

        .confirm-box .new-code-display {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--success);
            font-family: monospace;
            background: rgba(74,222,128,.08);
            border: 1px solid rgba(74,222,128,.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .confirm-actions { display: flex; gap: 10px; }
        .confirm-actions button { flex: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Tabs Navigation ── */
        .portal-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .portal-tab-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .portal-tab-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .portal-tab-btn.active {
            color: #fff;
            background: var(--accent);
        }

        .portal-tab-content.hidden {
            display: none !important;
        }

        /* ── Bar Chart Styling ── */
        .chart-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chart-bar-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chart-bar-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .chart-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .chart-bar-fill {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            height: 100%;
            border-radius: 6px;
            width: 0%; /* Animate via JS */
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .activity-log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        .activity-log-table th, .activity-log-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .activity-log-table th {
            color: var(--muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="portal-header">
    <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span>Sked Management Portal</span>
        <span class="badge">ADMIN</span>
    </div>
    <div class="user-info">
        <i class="fa-solid fa-circle-user" style="color: var(--accent);"></i>
        <span class="user-email" id="header-email">載入中...</span>
        <button class="btn-logout" id="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> 登出</button>
    </div>
</header>

<!-- Loading -->
<div id="loading-screen">
    <div class="spinner"></div>
    <span>驗證身份中...</span>
</div>

<!-- Access Denied -->
<div id="access-denied">
    <i class="fa-solid fa-lock"></i>
    <h2>存取遭拒</h2>
    <p>此頁面僅限管理員使用。</p>
    <a href="index.html" style="color: var(--accent); font-size: 14px; margin-top: 8px;">← 返回主頁</a>
</div>

<!-- Admin Content -->
<div id="admin-content">

    <!-- Tabs Navigation -->
    <div class="portal-tabs">
        <button class="portal-tab-btn active" data-target="tab-settings">
            <i class="fa-solid fa-user-gear"></i> 帳號與邀請碼設定
        </button>
        <button class="portal-tab-btn" data-target="tab-analytics">
            <i class="fa-solid fa-chart-line"></i> 數據流量與分析
        </button>
    </div>

    <!-- TAB 1: Settings -->
    <div id="tab-settings" class="portal-tab-content">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">總用戶數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-active" style="color: var(--success);">—</div>
                <div class="stat-label">啟用中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-inactive" style="color: var(--danger);">—</div>
                <div class="stat-label">已停用</div>
            </div>
        </div>

        <!-- Invite Code Section -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-key"></i>
                    邀請碼管理
                </div>
                <button class="btn btn-primary" id="btn-regenerate">
                    <i class="fa-solid fa-rotate"></i> 重新生成邀請碼
                </button>
            </div>

            <div id="invite-code-area">
                <div class="code-display">
                    <div class="code-label">目前有效邀請碼</div>
                    <div class="code-value" id="current-code">——</div>
                    <div class="code-status active" id="code-status-badge">
                        <i class="fa-solid fa-circle-check"></i> 有效
                    </div>
                </div>

                <div class="code-history">
                    <div class="code-history-title">歷史邀請碼</div>
                    <div class="code-history-list" id="code-history-list">
                        <div class="empty-state" style="padding: 20px;">載入中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- User Management Section -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-users"></i>
                    用戶管理
                </div>
                <button class="btn btn-primary" id="btn-refresh-users" style="background: rgba(91,124,246,.15); color: var(--accent2); border: 1px solid rgba(91,124,246,.3);">
                    <i class="fa-solid fa-arrows-rotate"></i> 重新整理
                </button>
            </div>

            <div id="user-table-area">
                <div class="empty-state">載入中...</div>
            </div>
        </div>
    </div>

    <!-- TAB 2: Analytics -->
    <div id="tab-analytics" class="portal-tab-content hidden">
        <!-- Filter Row -->
        <div class="section" style="padding: 16px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            <span style="font-size: 14px; font-weight: 600; color: var(--muted);"><i class="fa-solid fa-filter"></i> 篩選使用者範圍:</span>
            <select id="analytics-user-filter" style="background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer; min-width: 280px; transition: border-color 0.2s ease;">
                <option value="all">🌐 全局統計 (所有使用者)</option>
            </select>
        </div>

        <!-- Analytics Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-events-total">—</div>
                <div class="stat-label">累計上報事件數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-sessions-total" style="color: var(--warning);">—</div>
                <div class="stat-label">不重複會話數 (Sessions)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-shares-total" style="color: var(--accent2);">—</div>
                <div class="stat-label">連結分享次數</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-chart-bar"></i>
                    熱門功能使用排行 (全部歷史)
                </div>
            </div>
            <div class="chart-row" id="analytics-chart-container">
                <div class="empty-state">載入數據中...</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    近期使用者行為日誌 (最新 100 筆)
                </div>
                <button class="btn btn-primary" id="btn-refresh-analytics" style="background: rgba(91,124,246,.15); color: var(--accent2); border: 1px solid rgba(91,124,246,.3);">
                    <i class="fa-solid fa-arrows-rotate"></i> 重新整理
                </button>
            </div>
            <div style="overflow-x: auto;">
                <table class="activity-log-table">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>操作者</th>
                            <th>類別</th>
                            <th>事件名稱</th>
                            <th>動作詳細內容</th>
                        </tr>
                    </thead>
                    <tbody id="analytics-log-tbody">
                        <tr>
                            <td colspan="5" class="empty-state" style="text-align: center;">載入數據中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://bvsvmuktyhkoekjamwkm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2c3ZtdWt0eWhrb2VramFtd2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODI2ODYsImV4cCI6MjA5OTY1ODY4Nn0.w2LmPAdI5pF2_IxQdgOb1bYkf6P5CbEXxRoSx1p6h94';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// ── Init ──
sb.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;
    await initPortal();
});

async function initPortal() {
    if (!currentUser) {
        showAccessDenied();
        return;
    }

    document.getElementById('header-email').textContent = currentUser.email;
    document.getElementById('btn-logout').addEventListener('click', () => sb.auth.signOut());

    // Check admin role
    const { data: profile } = await sb
        .from('profiles')
        .select('role')
        .eq('id', currentUser.id)
        .single();

    if (!profile || profile.role !== 'admin') {
        showAccessDenied();
        return;
    }

    showAdminContent();
    await Promise.all([loadUsers(), loadInviteCodes()]);
}

function showAccessDenied() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('access-denied').style.display = 'flex';
    document.getElementById('admin-content').style.display = 'none';
}

function showAdminContent() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('access-denied').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
}

// ── Users ──
async function loadUsers() {
    const area = document.getElementById('user-table-area');
    area.innerHTML = '<div class="empty-state">載入中...</div>';

    const { data: users, error } = await sb.rpc('admin_get_all_users');

    if (error || !users) {
        area.innerHTML = `<div class="empty-state" style="color:var(--danger);">載入失敗：${error?.message}</div>`;
        return;
    }

    const total = users.length;
    const active = users.filter(u => u.is_active).length;
    const inactive = total - active;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-inactive').textContent = inactive;

    if (users.length === 0) {
        area.innerHTML = '<div class="empty-state">尚無用戶</div>';
        return;
    }

    area.innerHTML = `
        <table class="user-table">
            <thead>
                <tr>
                    <th>電子郵件</th>
                    <th>邀請碼</th>
                    <th>角色</th>
                    <th>狀態</th>
                    <th>加入時間</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                ${users.map(u => `
                    <tr data-user-id="${u.id}" data-is-active="${u.is_active}">
                        <td class="email-cell">${u.email}</td>
                        <td>${u.invite_code ? `<span class="invite-code-chip">${u.invite_code}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
                        <td>
                            <span class="tag ${u.role === 'admin' ? 'tag-admin' : 'tag-user'}">
                                ${u.role === 'admin' ? '<i class="fa-solid fa-crown"></i> 管理員' : '<i class="fa-solid fa-user"></i> 用戶'}
                            </span>
                        </td>
                        <td>
                            <span class="tag ${u.is_active ? 'tag-active' : 'tag-inactive'}">
                                <i class="fa-solid fa-circle${u.is_active ? '-check' : '-xmark'}"></i>
                                ${u.is_active ? '啟用' : '停用'}
                            </span>
                        </td>
                        <td style="color:var(--muted); font-size:12px;">${new Date(u.created_at).toLocaleDateString('zh-TW')}</td>
                        <td>
                            ${u.id !== currentUser.id ? `
                                <button class="btn btn-sm ${u.is_active ? 'btn-danger' : 'btn-success'} toggle-user-btn"
                                    data-user-id="${u.id}"
                                    data-is-active="${u.is_active}">
                                    <i class="fa-solid fa-${u.is_active ? 'ban' : 'circle-check'}"></i>
                                    ${u.is_active ? '停用' : '啟用'}
                                </button>
                            ` : '<span style="color:var(--muted); font-size:12px;">（自己）</span>'}
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;

    area.querySelectorAll('.toggle-user-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleUser(btn.dataset.userId, btn.dataset.isActive === 'true'));
    });
}

async function toggleUser(userId, currentActive) {
    const newActive = !currentActive;
    const { error } = await sb.rpc('admin_toggle_user', {
        p_user_id: userId,
        p_is_active: newActive
    });
    if (error) { alert('操作失敗：' + error.message); return; }
    await loadUsers();
}

// ── Invite Codes ──
async function loadInviteCodes() {
    const { data: codes, error } = await sb.rpc('admin_get_invite_codes');
    if (error || !codes) return;

    const active = codes.find(c => c.is_active);
    const inactive = codes.filter(c => !c.is_active);

    document.getElementById('current-code').textContent = active?.code || '無';
    const badge = document.getElementById('code-status-badge');
    if (active) {
        badge.className = 'code-status active';
        badge.innerHTML = '<i class="fa-solid fa-circle-check"></i> 有效';
    } else {
        badge.className = 'code-status inactive';
        badge.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> 無有效邀請碼';
    }

    const historyEl = document.getElementById('code-history-list');
    if (inactive.length === 0) {
        historyEl.innerHTML = '<div style="color:var(--muted); font-size:13px; padding:8px;">暫無歷史記錄</div>';
    } else {
        historyEl.innerHTML = inactive.map(c => `
            <div class="code-history-item">
                <span class="code-mono" style="color:var(--muted);">${c.code}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:11px; color:var(--muted);">${new Date(c.created_at).toLocaleDateString('zh-TW')}</span>
                    <span class="tag tag-inactive" style="font-size:11px; padding:2px 8px;">已失效</span>
                </div>
            </div>
        `).join('');
    }
}

// ── Regenerate ──
document.getElementById('btn-regenerate').addEventListener('click', async () => {
    if (!confirm('確定要重新生成邀請碼？\n目前的邀請碼將立即失效。')) return;

    const btn = document.getElementById('btn-regenerate');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 生成中...';

    const { data: newCode, error } = await sb.rpc('admin_regenerate_invite_code');

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-rotate"></i> 重新生成邀請碼';

    if (error) {
        alert('生成失敗：' + error.message);
        return;
    }

    showNewCodeModal(newCode);
    await loadInviteCodes();
});

function showNewCodeModal(code) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
        <div class="confirm-box">
            <h3><i class="fa-solid fa-key" style="color:var(--success);"></i> 新邀請碼已生成</h3>
            <p>舊的邀請碼已失效。請將以下邀請碼發給玩家：</p>
            <div class="new-code-display">${code}</div>
            <button class="btn btn-primary" style="width:100%;" onclick="this.closest('.confirm-overlay').remove()">
                <i class="fa-solid fa-check"></i> 確認
            </button>
        </div>
    `;
    document.body.appendChild(overlay);
}

// ── Refresh ──
document.getElementById('btn-refresh-users').addEventListener('click', loadUsers);

// ── Tabs Navigation Click Handler ──
document.querySelectorAll('.portal-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.portal-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.portal-tab-content').forEach(c => c.classList.add('hidden'));
        
        btn.classList.add('active');
        const target = btn.dataset.target;
        document.getElementById(target).classList.remove('hidden');
        
        if (target === 'tab-analytics') {
            loadAnalytics();
        }
    });
});

// ── Analytics ──
let allAnalyticsEvents = [];
let recentAnalyticsLogs = [];
let cachedUserMap = {};

async function loadAnalytics() {
    try {
        const area = document.getElementById('analytics-chart-container');
        area.innerHTML = '<div class="empty-state">載入數據中...</div>';

        // 1. Fetch users map
        const { data: users } = await sb.rpc('admin_get_all_users');
        cachedUserMap = {};
        if (users) {
            users.forEach(u => {
                cachedUserMap[u.id] = u.email;
            });
        }

        // 2. Fetch logs (fetch up to 100 recent events)
        const { data: logs, error: logsError } = await sb
            .from('analytics_events')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(100);
            
        if (logsError) throw logsError;
        recentAnalyticsLogs = logs;

        // 3. Fetch all events for statistics
        const { data: allEvents, error: allErr } = await sb
            .from('analytics_events')
            .select('session_id, event_name, event_category, user_id, created_at, event_data');

        if (allErr) throw allErr;
        allAnalyticsEvents = allEvents;

        // 4. Populate User Filter Dropdown
        const filterSelect = document.getElementById('analytics-user-filter');
        const currentValue = filterSelect.value;
        filterSelect.innerHTML = '<option value="all">🌐 全局統計 (所有使用者)</option>';

        const uniqueUsers = new Set();
        const uniqueSessions = new Set();

        allAnalyticsEvents.forEach(e => {
            if (e.user_id && cachedUserMap[e.user_id]) {
                uniqueUsers.add(e.user_id);
            } else if (e.session_id) {
                uniqueSessions.add(e.session_id);
            }
        });

        // Add user options
        uniqueUsers.forEach(uid => {
            const opt = document.createElement('option');
            opt.value = `user:${uid}`;
            opt.textContent = `👤 使用者: ${cachedUserMap[uid]}`;
            filterSelect.appendChild(opt);
        });

        // Add anonymous session options
        uniqueSessions.forEach(sid => {
            const opt = document.createElement('option');
            opt.value = `session:${sid}`;
            opt.textContent = `💻 訪客會話: ${sid.substring(0, 12)}...`;
            filterSelect.appendChild(opt);
        });

        // Restore selection
        if ([...filterSelect.options].some(opt => opt.value === currentValue)) {
            filterSelect.value = currentValue;
        }

        // 5. Render
        renderFilteredAnalytics();

    } catch (err) {
        console.error('Failed to load analytics:', err);
        document.getElementById('analytics-chart-container').innerHTML = `<div class="empty-state" style="color:var(--danger);">載入失敗: ${err.message}</div>`;
    }
}

function renderFilteredAnalytics() {
    const filterVal = document.getElementById('analytics-user-filter').value;
    
    // Filter
    let filteredEvents = allAnalyticsEvents;
    let filteredLogs = recentAnalyticsLogs;

    if (filterVal !== 'all') {
        const [type, id] = filterVal.split(':');
        if (type === 'user') {
            filteredEvents = allAnalyticsEvents.filter(e => e.user_id === id);
            filteredLogs = recentAnalyticsLogs.filter(e => e.user_id === id);
        } else if (type === 'session') {
            filteredEvents = allAnalyticsEvents.filter(e => e.session_id === id);
            filteredLogs = recentAnalyticsLogs.filter(e => e.session_id === id);
        }
    }

    // 1. Calculate metrics
    const totalEvents = filteredEvents.length;
    const sessions = new Set(filteredEvents.map(e => e.session_id));
    const shareCount = filteredEvents.filter(e => e.event_name === 'share_link').length;

    document.getElementById('stat-events-total').textContent = totalEvents;
    document.getElementById('stat-sessions-total').textContent = sessions.size;
    document.getElementById('stat-shares-total').textContent = shareCount;

    // 2. Render horizontal bar chart
    const chartContainer = document.getElementById('analytics-chart-container');
    chartContainer.innerHTML = '';

    const featureCounts = {};
    filteredEvents.forEach(e => {
        featureCounts[e.event_name] = (featureCounts[e.event_name] || 0) + 1;
    });

    const sortedFeatures = Object.entries(featureCounts)
        .sort((a, b) => b[1] - a[1]);

    if (sortedFeatures.length === 0) {
        chartContainer.innerHTML = '<div class="empty-state">此使用者範圍內尚無數據紀錄</div>';
    } else {
        const maxCount = sortedFeatures[0][1];
        
        const nameMap = {
            'tab_switch': '切換排軸頁籤 (Navigation)',
            'save_cloud': '保存個人/團隊紀錄到雲端',
            'load_cloud': '讀取個人/團隊雲端紀錄',
            'share_link': '建立/複製分享連結',
            'import_json': '自 JSON 檔案匯入',
            'export_json': '匯出為 JSON 檔案',
            'export_image': '個人排軸導出成圖片',
            'import_from_team': '個人排軸載入團隊計畫',
            'click_import_from_team_btn': '點擊【從團隊排軸匯入】按鈕',
            'import_fflogs': '從 FFLogs 匯入技能事件',
            'click_import_fflogs_btn': '點擊【從 FFLogs 匯入】按鈕',
            'login': '管理員/使用者登入',
            'register': '註冊新帳號',
            'logout': '登出帳號'
        };

        const chartRow = document.createElement('div');
        chartRow.className = 'chart-row';

        sortedFeatures.forEach(([eventName, count]) => {
            const pct = maxCount > 0 ? Math.round((count / maxCount) * 100) : 0;
            const displayName = nameMap[eventName] || eventName;
            
            const barHtml = `
                <div class="chart-bar-container">
                    <div class="chart-bar-label-row">
                        <span style="font-weight: 500;">${displayName}</span>
                        <span style="color: var(--muted);">${count} 次 (${pct}%)</span>
                    </div>
                    <div class="chart-bar-bg">
                        <div class="chart-bar-fill" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
            chartRow.insertAdjacentHTML('beforeend', barHtml);
        });
        chartContainer.appendChild(chartRow);
    }

    // 3. Render log table
    const logTbody = document.getElementById('analytics-log-tbody');
    logTbody.innerHTML = '';

    if (filteredLogs.length === 0) {
        logTbody.innerHTML = '<tr><td colspan="5" class="empty-state" style="text-align:center;">此篩選範圍內無近期日誌紀錄</td></tr>';
    } else {
        function formatEventAction(ev) {
            const data = ev.event_data || {};
            switch (ev.event_name) {
                case 'tab_switch':
                    const targetName = data.target || (data.code === 'team' ? '團隊技能排軸' : data.code === 'compare' ? '多人施法比較' : '個人技能排軸');
                    return `切換至 <strong>${targetName}</strong> 頁籤`;
                case 'import_fflogs':
                    const url = data['FFLogs 報告連結'] || data.reportCode || '';
                    const fight = data['選擇戰鬥段落'] || data.fightId || '未知段落';
                    const player = data['選擇玩家'] || data.player || '未知玩家';
                    const urlLink = url ? `<a href="${url}" target="_blank" style="color:var(--accent2); text-decoration:underline;">[報告連結]</a>` : '';
                    return `從 FFLogs 匯入: <strong>${player}</strong> (${fight}) ${urlLink}`;
                case 'click_import_fflogs_btn':
                    const mode = (ev.event_category === '多人比較' || ev.event_category === 'compare_planner' || data.target === 'compare') ? '多人施法比較' : '個人技能排軸';
                    return `點擊【從 FFLogs 匯入】按鈕 (${mode})`;
                case 'save_cloud':
                    return `保存雲端存檔: <strong>${data.name || '未命名'}</strong> (${data.type === 'new' ? '新存檔' : '覆蓋'})`;
                case 'load_cloud':
                    return `讀取雲端存檔: <strong>${data.name || '未命名'}</strong>`;
                case 'share_link':
                    return `生成分享連結權限: <strong>${data.type === 'edit' ? '可編輯' : '唯讀'}</strong>`;
                case 'import_json':
                    return `匯入排軸 JSON (副本/職業: ${data.duty || data.job || '未知'})`;
                case 'export_json':
                    return `導出 JSON 檔案 (副本/職業: ${data.duty || data.job || '未知'})`;
                case 'export_image':
                    return `匯出個人排軸為圖片`;
                case 'import_from_team':
                    return `匯入團隊計畫至個人排軸`;
                case 'click_import_from_team_btn':
                    return `點擊【從團隊排軸匯入】按鈕`;
                case 'login':
                    return `登入帳號 (${data.email || ''})`;
                case 'register':
                    return `註冊新帳號 (${data.email || ''})`;
                case 'logout':
                    return `登出帳號`;
                default:
                    return typeof data === 'object' ? JSON.stringify(data) : String(data);
            }
        }

        filteredLogs.forEach(log => {
            const tr = document.createElement('tr');
            const localTime = new Date(log.created_at).toLocaleString();
            
            let categoryText = '系統導覽';
            let badgeStyle = 'background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border);';
            
            if (log.event_category === 'team_planner' || log.event_category === '團隊排軸') {
                categoryText = '團隊排軸';
                badgeStyle = 'background: rgba(91,124,246,0.15); color: #7c9ef8; border: 1px solid rgba(91,124,246,0.3);';
            } else if (log.event_category === 'personal_planner' || log.event_category === '個人排軸') {
                categoryText = '個人排軸';
                badgeStyle = 'background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3);';
            } else if (log.event_category === 'compare_planner' || log.event_category === 'compare' || log.event_category === '多人比較') {
                categoryText = '多人比較';
                badgeStyle = 'background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(236,72,153,0.3);';
            } else if (log.event_category === 'auth') {
                categoryText = '身份驗證';
                badgeStyle = 'background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3);';
            } else if (log.event_category === 'navigation') {
                categoryText = '頁面導覽';
                badgeStyle = 'background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3);';
            }
            
            // Resolve identity
            let identityText = '<span style="color:var(--muted); font-size:12px;">訪客 (Anonymous)</span>';
            if (log.user_id && cachedUserMap[log.user_id]) {
                identityText = `<strong style="color:var(--accent2); font-size:12px;"><i class="fa-solid fa-circle-user"></i> ${cachedUserMap[log.user_id]}</strong>`;
            } else if (log.session_id) {
                identityText = `<span style="color:var(--muted); font-size:11px; font-family:monospace;"><i class="fa-solid fa-laptop"></i> ${log.session_id.substring(0, 8)}...</span>`;
            }

            tr.innerHTML = `
                <td style="white-space:nowrap; color: var(--muted);">${localTime}</td>
                <td>${identityText}</td>
                <td><span class="badge" style="${badgeStyle} font-size:11px; padding: 2px 8px; border-radius: 4px; font-weight: 600;">${categoryText}</span></td>
                <td style="font-family: monospace; font-weight: bold; color: var(--accent2);">${log.event_name}</td>
                <td>${formatEventAction(log)}</td>
            `;
            logTbody.appendChild(tr);
        });
    }
}

// Bind dropdown change event
document.getElementById('analytics-user-filter').addEventListener('change', renderFilteredAnalytics);
document.getElementById('btn-refresh-analytics').addEventListener('click', loadAnalytics);
</script>
